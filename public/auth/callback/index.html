<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Signing in…</title></head>
<body>
<script>
  const hash = window.location.hash
  if (hash) {
    window.location.replace('com.peretarrida.fittracker://auth/callback' + hash)
  } else {
    window.location.replace('/')
  }
</script>
</body>
</html>
